<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Verity</title>
  <style>
    body {
      font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 250px;
      margin: 0;
      padding: 16px;
      color: #1a1a2e;
      background: #fdfdfd;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 12px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 16px;
    }
    .logo-icon {
      background: #3b5998;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .settings-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 4px;
      color: #4b5563;
      transition: background 0.2s;
    }
    .settings-btn:hover {
      background: #e2e8f0;
      color: #1a1a2e;
    }
    .content {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.5;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 6px 10px;
      background: #dcfce7;
      color: #166534;
      border-radius: 6px;
      font-weight: 500;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
    }
    .verity-logo-icon {
      width: 24px; height: 24px; 
      object-fit: contain;
      border-radius: 6px;
    }

    /* Dark Theme */
    body.dark-theme { background: #1e1e2f; color: #e2e8f0; }
    body.dark-theme .header { border-color: #33334d; }
    body.dark-theme .content { color: #cbd5e1; }
    body.dark-theme .settings-btn { color: #94a3b8; }
    body.dark-theme .settings-btn:hover { background: #33334d; color: #e2e8f0; }
    body.dark-theme .status { background: rgba(22, 101, 52, 0.3); color: #4ade80; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"><img src="logo.png" class="verity-logo-icon"/> Verity</div>
    <button id="settingsBtn" class="settings-btn" title="Settings" data-i18n-title="settingsTitleAttr">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>
  <div class="content">
    <span data-i18n="popupDesc">Fact check LinkedIn posts using AI. Click the Verity button next to any post to analyze its claims.</span> <br>
    <div class="status">
      <div class="dot"></div> <span data-i18n="popupActive">Active</span>
    </div>
  </div>
  <div id="authArea" style="margin-top:12px;">
    <p>Register for Beta Access if you haven't already:</p>
    <a href="https://verity.dpdns.org/beta-access" target="_blank" style="color:#3b5998; text-decoration:none; font-weight:500;">https://verity.dpdns.org/beta-access</a>
    <br><br>
    <div style="display:flex; justify-content: space-between;">
      <a href="https://verity.dpdns.org/auth/magic-link" target="_blank" style="color:#3b5998; text-decoration:none; font-weight:500;">Request Magic Link</a> <a href="https://verity.dpdns.org/support" target="_blank" style="color:#3b5998; text-decoration:none; font-weight:500;">Support</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
